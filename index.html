<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="NutriTrack - Tu checklist diario de nutrición y hábitos saludables">
  <meta name="theme-color" content="#1A6B3C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>NutriTrack - Checklist Diario</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%231A6B3C'/><text x='32' y='44' font-size='36' text-anchor='middle' fill='white' font-family='Arial'>N</text></svg>">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <!-- Notification Banner -->
  <div id="notif-banner" class="notif-banner" onclick="Notificaciones.solicitarPermiso()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    <span>Activa las notificaciones para no olvidar tu plan</span>
  </div>

  <header class="app-header">
    <a href="index.html" class="logo">
      <div class="logo-icon">N</div>
      <span class="logo-text">NutriTrack</span>
    </a>
    <div class="header-actions">
      <div id="dark-toggle" class="dark-toggle" title="Modo oscuro">
        <span class="toggle-icon icon-sun">☀️</span>
        <span class="toggle-icon icon-moon">🌙</span>
      </div>
    </div>
  </header>

  <main class="container">
    <div id="fecha-display" class="fecha-display"></div>
    <div id="stats-row" class="stats-row"></div>
    <div id="checklist-container"></div>
    <div id="nota-container" class="nota-section"></div>
  </main>

  <!-- Overlay: Nota obligatoria -->
  <div id="nota-overlay" class="overlay">
    <div class="overlay-content">
      <h2>⏰ ¡Alto!</h2>
      <p>Son más de las 9:00 PM y no has escrito tu nota del día. No puedes cerrar sin registrar cómo fue tu día.</p>
      <textarea id="overlay-nota" placeholder="Escribe qué comiste, cómo te sentiste, qué podrías mejorar..."></textarea>
      <button id="overlay-guardar" class="btn btn-primary btn-full">Guardar nota</button>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item active" id="nav-checklist">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span>Hoy</span>
    </a>
    <a href="comidas.html" class="nav-item" id="nav-comidas">
      <svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
      <span>Comidas</span>
    </a>
    <a href="progreso.html" class="nav-item" id="nav-progreso">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>Peso</span>
    </a>
    <a href="historial.html" class="nav-item" id="nav-historial">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Historial</span>
    </a>
    <a href="config.html" class="nav-item" id="nav-config">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>Config</span>
    </a>
  </nav>

  <script src="js/storage.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => App.init());
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
